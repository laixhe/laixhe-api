syntax = "proto3";

package ecode;

option go_package = "webapi/api/gen/ecode;ecode";

// 错误状态码
enum ECode {
    Success              = 0;   // 成功
    AuthUserError        = 101; // 用户或密码错误
    UserExist            = 102; // 用户已存在
    UserNotExist         = 103; // 用户不存在
    EmailExist           = 104; // 邮箱已存在
    EmailNotExist        = 105; // 邮箱不存在
    PhoneExist           = 106; // 手机号码已存在
    PhoneNotExist        = 107; // 手机号码不存在
}