syntax = "proto3";

package cmongodb;

option go_package = "webapi/api/gen/config/cmongodb;cmongodb";

// MongoDB数据库配置
message MongoDB {
  // 连接地址
  string uri               = 1; // @gotags: mapstructure:"uri"
  // 指定数据库
  string database          = 2; // @gotags: mapstructure:"database"
  // 最大连接的数量
  uint64 max_pool_size     = 3; // @gotags: mapstructure:"max_pool_size"
  // 最小连接的数量
  uint64 min_pool_size     = 4; // @gotags: mapstructure:"min_pool_size"
  // 最大连接的空闲时间(设置了连接可复用的最大时间)(单位秒)
  int64 max_conn_idle_time = 5; // @gotags: mapstructure:"max_conn_idle_time"
}